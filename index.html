<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Pens</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body{margin:0;font-family:'Playfair Display',serif;background:#0f0f15;color:white}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#1a1a2e;}
.logo{font-size:22px;color:gold}
.search-box{flex:1;margin:0 20px;display:flex;background:white;border-radius:5px;}
.search-box input{flex:1;border:none;padding:8px}
.search-box span{color:black;padding:8px}
.nav-actions{display:flex;gap:15px}
.categories{display:flex;justify-content:space-around;background:#141421;padding:10px}
.hero{text-align:center;padding:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#1c1c25;padding:15px;border-radius:10px;text-align:center}
.card img{width:100%;height:180px;object-fit:cover}
.btn{background:gold;border:none;padding:10px;cursor:pointer}
</style>
</head>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script>
const e = React.createElement;

function App() {

  const [page, setPage] = React.useState("home");
  const [cart, setCart] = React.useState([]);
  const [wishlist, setWishlist] = React.useState([]);
  const [search, setSearch] = React.useState("");
  const [selectedProduct, setSelectedProduct] = React.useState(null);

  const products = [
    {id:1,name:"Montblanc Meisterstück",price:75000,img:"https://pictures.kartmax.in/sites/StAFxmqh5LfPz3ZQSdCh/product-images/WP36503-1.jpg"},
    {id:2,name:"Parker Duofold",price:45000,img:"https://www.onlinemantra.in/cdn/shop/files/PRP_DUO_100_RED_GT_FPF_031764_6_d3f6466b-9e4a-4685-9ce5-1fccc38ae1d2_1024x1024.jpg?v=1734529130"},
    {id:3,name:"Aurora Diamante",price:120000000,img:"https://img.i-scmp.com/cdn-cgi/image/fit=contain,width=1024,format=auto/sites/default/files/d8/images/canvas/2022/08/01/1c0c94e2-1b4a-4aca-ac25-757c3bc551a9_f9c2a851.jpg"},
    {id:4,name:"Visconti Homo Sapiens",price:90000,img:"https://m.media-amazon.com/images/I/712NxDFQuKL.jpg"}
  ];

  const filteredProducts = products.filter(p =>
    p.name.toLowerCase().includes(search.toLowerCase())
  );

  const addToCart = (p) => setCart([...cart, p]);

  const removeFromCart = (index) => {
    let newCart = [...cart];
    newCart.splice(index,1);
    setCart(newCart);
  };

  const toggleWishlist = (p) => {
    const exists = wishlist.find(item => item.id === p.id);
    if(exists){
      setWishlist(wishlist.filter(item => item.id !== p.id));
    } else {
      setWishlist([...wishlist, p]);
    }
  };

  return e("div", null,

    // 🔹 NAVBAR
    e("div",{className:"navbar"},
      e("div",{className:"logo", onClick:()=>setPage("home"), style:{cursor:"pointer"}},"Royal Pens"),

      e("div",{className:"search-box"},
        e("input",{
          placeholder:"Search luxury pens...",
          value:search,
          onChange:(ev)=>setSearch(ev.target.value)
        }),
        e("span",{className:"material-icons"},"search")
      ),

      e("div",{className:"nav-actions"},
        e("button",{onClick:()=>alert("Login coming soon")},"Login"),

        e("span",
          {
            className:"material-icons",
            style:{cursor:"pointer"},
            onClick:()=>alert("Wishlist items: "+wishlist.length)
          },
          "favorite"
        ),

        e("span",
          {
            className:"material-icons",
            style:{cursor:"pointer"},
            onClick:()=>setPage("cart")
          },
          "shopping_cart"
        ),
        e("span",null,"("+cart.length+")")
      )
    ),

    // 🔹 CATEGORY BAR
    e("div",{className:"categories"},
      ["Premium","Gold","Limited","Gifts"].map((c,i)=>
        e("div",{key:i, onClick:()=>setPage("home")},c)
      )
    ),

    // 🔹 HOME PAGE
    page==="home" && e("div", null,
      e("div",{className:"hero"},
        e("h1",null,"Luxury Writing Instruments")
      ),

      e("div",{className:"grid"},
        filteredProducts.map(p =>
          e("div",{className:"card", key:p.id},

            e("img",{
              src:p.img,
              style:{cursor:"pointer"},
              onClick:()=>{
                setSelectedProduct(p);
                setPage("detail");
              }
            }),

            e("h3",null,p.name),
            e("p",null,"₹"+p.price),

            e("button",{className:"btn", onClick:()=>addToCart(p)},"Add to Cart"),

            e("span",
              {
                className:"material-icons",
                style:{cursor:"pointer", display:"block", marginTop:"10px"},
                onClick:()=>toggleWishlist(p)
              },
              "favorite_border"
            )
          )
        )
      )
    ),

    // 🔹 PRODUCT DETAIL
    page==="detail" && selectedProduct &&
      e("div",{className:"container"},
        e("h2",null,selectedProduct.name),
        e("img",{src:selectedProduct.img, style:{width:"300px"}}),
        e("p",null,"Price: ₹"+selectedProduct.price),
        e("button",{className:"btn", onClick:()=>addToCart(selectedProduct)},"Add to Cart"),
        e("button",{className:"btn", onClick:()=>setPage("home")},"Back")
      ),

    // 🔹 CART PAGE
    page==="cart" && e("div",{className:"container"},
      e("h2",null,"Your Cart"),

      cart.length===0
        ? e("p",null,"Cart is empty")
        : cart.map((item,index)=>
            e("div",{key:index},
              item.name + " - ₹" + item.price,

              e("button",
                {
                  className:"btn",
                  style:{marginLeft:"10px"},
                  onClick:()=>removeFromCart(index)
                },
                "Remove"
              )
            )
          ),

      cart.length>0 &&
        e("button",
          {
            className:"btn",
            style:{marginTop:"20px"},
            onClick:()=>setPage("checkout")
          },
          "Checkout"
        )
    ),

    // 🔹 CHECKOUT
    page==="checkout" && e("div",{className:"container"},
      e("h2",null,"Checkout"),
      e("input",{placeholder:"Full Name"}),
      e("input",{placeholder:"Address"}),
      e("input",{placeholder:"Email"}),

      e("button",
        {
          className:"btn",
          onClick:()=>alert("Order placed successfully!")
        },
        "Place Order"
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>

</body>
</html>
